services:
  rabbitmq:
    image: rabbitmq:4.3.0-rc.0-management-alpine
    hostname: rabbitmq
    container_name: rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "wohus"
      RABBITMQ_DEFAULT_PASS: "pass"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  mail:
    image: maildev/maildev
    container_name: mail_serv
    environment:
      - TZ=Europe/Chishinau
      - MAILDEV_WEB_PORT=1080
      - MAILDEV_SMTP_PORT=1025
      - MAILDEV_HOST=0.0.0.0
    ports:
      - "8080:1080"
      - "1025:1025"
    logging:
      driver: "json-file"
      options:
        max-size: "1m"

  pg:
    image: postgres
    environment:
      POSTGRES_DB: proj6
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"

volumes:
  rabbitmq-data:
