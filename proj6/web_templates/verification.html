{% extends 'base_home.html' %}

{% block title %}
    E-mail Verification
{% endblock %}

{% block main %}
    <div>
        <div class="d-flex flex-column align-items-center my-3">
            <h3>
                Verify your email
            </h3>
            <div
                    id="loading-indicator"
                    class="spinner-border"
                    role="status"
            >
              <span class="visually-hidden">Loading...</span>
            </div>

            <div
                    id="missing-token-alert"
                    class="alert alert-danger d-none my-3"
                    role="alert"
            >
                Missing verification token
            </div>
            <div
                    id="verification-error-alert"
                    class="alert alert-danger d-none my-3"
                    role="alert"
            >
                <h5 class="alert-header">
                    Something went wrong
                </h5>

                Sorry, we could not verify your email address
            </div>

        </div>
    </div>

    <script>
        const loadingIndicator = document.getElementById('loading-indicator');
        (async () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                loadingIndicator.classList.add('d-none');
                document.getElementById('missing-token-alert').classList.remove('d-none');
                return;
            }
            const verificationURL = "{{ url_for('verify:verify') }}";
            const homeURL = "{{ url_for('home') }}";
            const result = await fetch(verificationURL, {
                method: 'POST',
                body: JSON.stringify({ token }),
                headers: {
                    'Content-Type': 'application/json',
                },
            })
            loadingIndicator.classList.add('d-none');
            if (result.ok) {
                window.location.href = homeURL;
            } else {
                document.getElementById('verification-error-alert').classList.remove('d-none')
            }
            console.log(token, verificationURL);
        })();
    </script>

{% endblock %}
